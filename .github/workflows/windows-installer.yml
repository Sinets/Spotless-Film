name: Build Windows installer

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r src/requirements_spotless_film.txt
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: PyInstaller (spec)
        working-directory: src
        run: pyinstaller --clean --noconfirm spotless_film.spec

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      - name: Compile installer (.iss → Setup.exe)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer/windows/SpotlessFilm.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spotless-film-windows
          path: |
            src/dist/SpotlessFilm.exe
            installer/windows/Output/*.exe
